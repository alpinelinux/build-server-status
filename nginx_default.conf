server {
    listen 80 default_server;
    server_name _;

    root /var/www;
    index index.html;

    location /events {
        proxy_pass http://backend:8080/events;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection "";
        proxy_set_header Host $http_host;
    }
}
